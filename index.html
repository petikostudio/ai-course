// ─── AGE GROUP ────────────────────────────────────────────────────────────────
function getAgeGroup(age) {
  const a = parseInt(age);
  if (a <= 10) return "child";      // 7–10
  if (a <= 13) return "tween";     // 11–13
  if (a <= 17) return "teen";      // 14–17
  return "adult";                   // 18+
}

// ─── RANKS ────────────────────────────────────────────────────────────────────
const XP_THRESHOLDS = [0, 150, 350, 600, 900, 1300];
function getRankIndex(xp) {
  let r = 0;
  for (let i = XP_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= XP_THRESHOLDS[i]) { r = i; break; }
  }
  return r;
}

// ─── STORAGE KEY ─────────────────────────────────────────────────────────────
function storageKey(name) {
  return `aiq-${name.toLowerCase().replace(/\s+/g, "-")}`;
}

// ─── SYSTEM PROMPT ────────────────────────────────────────────────────────────
function buildSystemPrompt(profile, lang) {
  const group = getAgeGroup(profile.age);
  const toneMap = {
    child: lang === "ru"
      ? "очень простой язык, короткие предложения, игровые метафоры, задания на 5 минут максимум"
      : "very simple language, short sentences, game-like metaphors, max 5-minute tasks",
    tween: lang === "ru"
      ? "дружелюбный и живой тон, без занудства, задания 5-10 минут, отсылки к интересам"
      : "friendly and lively tone, no boring parts, 5-10 min tasks, references to interests",
    teen: lang === "ru"
      ? "равный разговор, прямо и уважительно, без сюсюканья, задания 10-15 минут, реальные взрослые результаты"
      : "peer-level conversation, direct and respectful, no dumbing down, 10-15 min tasks, real results",
    adult: lang === "ru"
      ? "профессиональный партнёрский тон, конкретика и польза, задания 10-20 минут, применимо прямо сейчас"
      : "professional peer tone, concrete value, 10-20 min tasks, immediately applicable",
  };
  const isRu = lang === "ru";
  return `You are a creator of personalised AI-learning quests.

USER PROFILE:
- Name: ${profile.name}
- Age: ${profile.age} (age group: ${group})
- Gender: ${profile.gender}
- Interests: ${profile.interests.join(", ")}
- Favourites: ${profile.favorites || "not specified"}
- Tech level: ${profile.techLevel}

TONE: ${toneMap[group]}

PERSONALISATION RULES:
1. ALL examples, tasks and metaphors must use the user's interests. If they love anime — every example is anime-adjacent.
2. Task difficulty matches age group. Children: magic & play. Tweens: cool discoveries. Teens: real skills. Adults: career/life value.
3. Each mission takes 5-15 min max. Every result must be tangible: a text, file, idea, created thing.
4. Missions unlock sequentially — each one builds on the previous.
5. Level 1: meet Claude, fast wins. Level 2: prompt skills, co-creation. Level 3: digital building, real projects.

RESPOND ONLY with valid JSON, no markdown, no explanation:
{
  "title": "personalised course title (use name or interest reference)",
  "subtitle": "short subtitle",
  "levels": [
    {
      "id": 1,
      "name": "level name",
      "tagline": "one-line level essence",
      "missions": [
        {
          "id": "1-1",
          "name": "mission name",
          "icon_index": 0,
          "xp": 50,
          "hook": "one sentence why this is cool",
          "context": "2-3 sentences: what skill/tool is this, how is it used in real life. Simple, no jargon.",
          "task": "step-by-step: exactly what to do",
          "result": "concrete output description",
          "hint": "tip or lifehack",
          "card_id": "c1"
        }
      ]
    }
  ]
}

Make 3 levels, 4 missions each (12 total). XP per mission: 40-120, total ~900.
Assign card_ids sequentially: level1→c1-c4, level2→c5-c8, level3→c9-c12. Last mission gets c15.
${isRu ? "Write ALL content in Russian." : "Write ALL content in English."}`;
}

// ─── API CALLS ────────────────────────────────────────────────────────────────
async function generateCourse(profile, lang) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": window.ANTHROPIC_API_KEY || "",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: buildSystemPrompt(profile, lang),
      messages: [{ role: "user", content: "Create the course JSON now." }],
    }),
  });
  const data = await res.json();
  const text = data.content?.find(b => b.type === "text")?.text || "";
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system,
      messages: [{ role: "user", content: `Mission: ${mission.name}\nTask: ${mission.task}\nUser answer: ${answer}` }],
    }),
  });
  const data = await res.json();
  return data.content?.find(b => b.type === "text")?.text || "";
}

// ─── CHIP SELECT ──────────────────────────────────────────────────────────────
function ChipSelect({ options, value, onChange, max = 5 }) {
  return (
    <div className="chips">
      {options.map(opt => (
        <button key={opt} type="button"
          className={`chip ${value.includes(opt) ? "sel" : ""}`}
          onClick={() => {
            if (value.includes(opt)) onChange(value.filter(v => v !== opt));
            else if (value.length < max) onChange([...value, opt]);
          }}>
          {opt}
        </button>
      ))}
    </div>
  );
}

// ─── TOAST QUEUE ─────────────────────────────────────────────────────────────
function ToastDisplay({ toasts }) {
  return (
    <>
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
      ))}
    </>
  );
}

// ─── INTRO SCREEN ─────────────────────────────────────────────────────────────
function IntroScreen({ lang, t, onStart, savedData }) {
  const [form, setForm] = useState({ name:"", age:"", gender: t.genders[2], interests:[], favorites:"", techLevel: t.techLevels[0][0] });
  const [errors, setErrors] = useState({});

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = true;
    if (!form.age || form.age < 7 || form.age > 99) e.age = true;
    if (form.interests.length === 0) e.interests = true;
    setErrors(e);
    return !Object.keys(e).length;
  };

  return (
    <div className="content">
      <div className="intro-hero">
        <div className="intro-badge">{t.appBadge}</div>
        <h1 className="intro-title">{t.appTitle}</h1>
        <p className="intro-sub">{t.appSub}</p>
      </div>

      {savedData && (
        <div className="resume-banner">
          <span style={{fontSize:13}}>{t.resume_banner}: <strong>{savedData.profile.name}</strong></span>
          <div className="resume-btns">
            <button className="btn-sm btn-sm-pri" onClick={() => onStart(savedData.profile, true, savedData)}>{t.resume_continue}</button>
            <button className="btn-sm btn-sm-ghost" onClick={() => onStart(null, false, null)}>{t.resume_new}</button>
          </div>
        </div>
      )}

      <div className="form-card">
        <div className="form-section">
          <div className="form-row">
            <div>
              <label className="form-label"><span className="num">01</span>{t.f_name}</label>
              <input type="text" placeholder={t.f_namePh} value={form.name}
                className={errors.name ? "err" : ""}
                onChange={e => setForm({...form, name: e.target.value})} />
            </div>
            <div>
              <label className="form-label"><span className="num">02</span>{t.f_age}</label>
              <input type="number" placeholder={t.f_agePh} value={form.age} min={7} max={99}
                className={errors.age ? "err" : ""}
                onChange={e => setForm({...form, age: e.target.value})} />
            </div>
          </div>
        </div>

        <div className="form-section">
          <label className="form-label"><span className="num">03</span>{t.f_gender}</label>
          <div className="chips">
            {t.genders.map(g => (
              <button key={g} type="button" className={`chip ${form.gender === g ? "sel" : ""}`}
                onClick={() => setForm({...form, gender: g})}>{g}</button>
            ))}
          </div>
        </div>

        <div className="form-section">
          <label className="form-label">
            <span className="num">04</span>{t.f_interests}
            {errors.interests && <span style={{color: C.danger, marginLeft:8, textTransform:"none", letterSpacing:0, fontWeight:400}}> — {t.f_interestsErr}</span>}
          </label>
          <ChipSelect options={t.interests} value={form.interests} onChange={v => setForm({...form, interests:v})} max={5} />
        </div>

        <div className="form-section">
          <label className="form-label"><span className="num">05</span>{t.f_favorites}</label>
          <textarea placeholder={t.f_favoritesPh} value={form.favorites}
            onChange={e => setForm({...form, favorites: e.target.value})} />
        </div>

        <div className="form-section">
          <label className="form-label"><span className="num">06</span>{t.f_techLevel}</label>
          <select value={form.techLevel} onChange={e => setForm({...form, techLevel: e.target.value})}>
            {t.techLevels.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
          </select>
        </div>

        <button className="btn-gen" onClick={() => { if (validate()) onStart(form, false, null); }}>
          {t.f_submit}
        </button>
      </div>
    </div>
  );
}

// ─── LOADING SCREEN ───────────────────────────────────────────────────────────
function LoadingScreen({ profile, t }) {
  const [step, setStep] = useState(0);
  useEffect(() => {
    const timers = t.loading_steps.map((_, i) =>
      setTimeout(() => setStep(s => Math.max(s, i + 1)), i * 900 + 500)
    );
    return () => timers.forEach(clearTimeout);
  }, []);
  return (
    <div className="content">
      <div className="loading-wrap">
        <div className="loader-ring" />
        <div className="load-title">{t.loading_title} {profile.name}</div>
        <p style={{color: C.textMuted, fontSize:13}}>{t.loading_sub}</p>
        <ul className="load-steps">
          {t.loading_steps.map((s, i) => (
            <li key={i} className={`ls ${i < step ? "done" : i === step ? "act" : ""}`}>
              <span className="ls-dot" />{s}
            </li>
          ))}
        </ul>
      </div>
    </div>
  );
}

// ─── POWER CARD ───────────────────────────────────────────────────────────────
function PowerCard({ card, unlocked }) {
  return (
    <div className={`pcard ${unlocked ? "unlocked" : "locked-card"}`}>
      <span className="pcard-icon">{card.icon}</span>
      <div className="pcard-name">{card.name}</div>
      <div className="pcard-desc">{card.desc}</div>
    </div>
  );
}

// ─── MISSION CARD ─────────────────────────────────────────────────────────────
function MissionCard({ mission, index, status, profile, lang, t, powerCards, onComplete }) {
  const [open, setOpen] = useState(false);
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState("");
  const [loadingFb, setLoadingFb] = useState(false);
  const card = powerCards.find(c => c.id === mission.card_id);

  const toggle = () => { if (status !== "locked") setOpen(o => !o); };

  const handleSubmit = async () => {
    if (!answer.trim()) return;
    setLoadingFb(true);
    try {
      const fb = await generateFeedback(profile, mission, answer, lang);
      setFeedback(fb);
    } catch {
      setFeedback(lang === "ru" ? "Миссия засчитана. Отличная работа." : "Mission complete. Great work.");
    }
    onComplete(mission.id, mission.xp, mission.card_id);
    setLoadingFb(false);
  };

  const icon = ICONS[mission.icon_index % ICONS.length];

  return (
    <div className={`mc ${open && status !== "done" ? "open" : ""} ${status === "done" ? "done" : ""} ${status === "locked" ? "locked" : ""}`}
      style={{animationDelay: `${index * 0.04}s`}}>
      <div className="mc-head" onClick={toggle}>
        <div className="mc-icon">{icon}</div>
        <div className="mc-info">
          <div className="mc-name">{mission.name}</div>
          <div className="mc-hook">{status === "done" ? t.mission_completed : status === "locked" ? t.mission_locked : mission.hook}</div>
        </div>
        <div className="mc-xp">{status === "done" ? "✓" : "+"}{mission.xp} XP</div>
      </div>

      {open && status !== "locked" && (
        <div className="mc-body">
          <div className="ms"><div className="ms-lbl">{t.mission_why}</div><p>{mission.context}</p></div>
          <div className="ms"><div className="ms-lbl">{t.mission_task}</div><p>{mission.task}</p></div>
          <div className="ms"><div className="ms-lbl">{t.mission_result}</div><p>{mission.result}</p></div>
          {mission.hint && <div className="ms"><div className="ms-lbl">{t.mission_hint}</div><p style={{color: C.textMuted}}>{mission.hint}</p></div>}

          {status !== "done" ? (
            <div className="ans-area">
              <div className="ms-lbl" style={{marginBottom:7}}>{t.mission_answer_label}</div>
              <textarea className="ans-ta" placeholder={t.mission_answer_ph}
                value={answer} onChange={e => setAnswer(e.target.value)} />
              <div className="btn-row">
                <button className="btn btn-pri" onClick={handleSubmit}
                  disabled={!answer.trim() || loadingFb}>
                  {loadingFb ? t.mission_evaluating : t.mission_submit}
                </button>
                <button className="btn btn-ghost" onClick={() => setOpen(false)}>{t.mission_collapse}</button>
              </div>
            </div>
          ) : (
            <div className="done-badge">✓ {t.mission_done_badge}</div>
          )}

          {feedback && <div className="feedback-box">{feedback}</div>}

          {(status === "done" || feedback) && card && (
            <div className="card-unlock-note">✦ {t.card_unlocked} «{card.name}»</div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── PARENT PANEL ─────────────────────────────────────────────────────────────
function ParentPanel({ profile, course, completed, totalXP, t, lang }) {
  const allMissions = course.levels.flatMap(l => l.missions);
  const doneCount = Object.keys(completed).length;
  const progress = allMissions.length > 0 ? (doneCount / allMissions.length) * 100 : 0;
  const rankIdx = getRankIndex(totalXP);
  const ranks = T[lang].ranks;
  const unlockedCards = Object.values(completed).filter(v => v.card_id).map(v => v.card_id).length;

  const logEntries = Object.entries(completed)
    .sort((a, b) => b[1].ts - a[1].ts)
    .slice(0, 10);

  return (
    <div>
      <div className="panel-card">
        <div className="panel-title">{t.parent_sub}</div>
        <div className="pbar2-wrap"><div className="pbar2-fill" style={{width: `${progress}%`}} /></div>
        <div style={{fontSize:12, color: C.textMuted, marginBottom:16}}>{Math.round(progress)}%</div>
        <div className="stat-grid">
          <div className="stat-item"><div className="stat-val green">{doneCount}</div><div className="stat-lbl">{t.parent_completed}</div></div>
          <div className="stat-item"><div className="stat-val gold">{totalXP}</div><div className="stat-lbl">{t.parent_xp}</div></div>
          <div className="stat-item"><div className="stat-val accent">{ranks[rankIdx]}</div><div className="stat-lbl">{t.parent_rank}</div></div>
          <div className="stat-item"><div className="stat-val" style={{color:"#c4b5fd"}}>{unlockedCards}</div><div className="stat-lbl">{t.parent_cards}</div></div>
        </div>
      </div>

      <div className="panel-card">
        <div className="panel-title">{t.parent_log}</div>
        {logEntries.length === 0 ? (
          <p style={{color: C.textMuted, fontSize:13}}>{t.parent_none}</p>
        ) : (
          logEntries.map(([id, data]) => (
            <div className="log-item" key={id}>
              <span className="log-name">{data.name}</span>
              <span style={{display:"flex", gap:10}}>
                <span className="log-xp">+{data.xp} XP</span>
                <span className="log-date">{new Date(data.ts).toLocaleDateString(lang === "ru" ? "ru-RU" : "en-GB")}</span>
              </span>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ─── CARDS PANEL ──────────────────────────────────────────────────────────────
function CardsPanel({ unlockedCardIds, t, lang }) {

    <div>
      <p className="cards-intro">{t.cards_sub}</p>

// ─── FINAL SCREEN ─────────────────────────────────────────────────────────────
function FinalScreen({ profile, totalXP, unlockedCardIds, lang, t, onRestart }) {

  const ranks = T[lang].ranks;
  return (
    <div className="content">
      <div className="final-wrap">
        <div className="final-icon">◈</div>
        <div className="final-title">{t.final_title}</div>
        <p className="final-sub">{t.final_sub}</p>
        <div className="final-stats">
          <div className="fs-item"><div className="fs-val" style={{color: C.gold}}>{totalXP}</div><div className="fs-lbl">{t.final_total_xp}</div></div>
          <div className="fs-item"><div className="fs-val" style={{color:"#c4b5fd", fontSize:18}}>{ranks[rankIdx]}</div><div className="fs-lbl">{t.final_rank}</div></div>

// ─── COURSE SCREEN ────────────────────────────────────────────────────────────
function CourseScreen({ profile, course, lang, t, initialCompleted, initialXP, onRestart }) {
  const [completed, setCompleted] = useState(initialCompleted || {});
  const [totalXP, setTotalXP] = useState(initialXP || 0);
  const [tab, setTab] = useState("course");
  const [toasts, setToasts] = useState([]);
  const [showSaved, setShowSaved] = useState(false);
  const toastId = useRef(0);
  const prevRankRef = useRef(getRankIndex(initialXP || 0));

  const powerCards = lang === "ru" ? POWER_CARDS_RU : POWER_CARDS_EN;
  const allMissions = course.levels.flatMap(l => l.missions);
  const totalPossibleXP = allMissions.reduce((s, m) => s + m.xp, 0);
  const unlockedCardIds = Object.values(completed).filter(v => v.card_id).map(v => v.card_id);
  const rankIdx = getRankIndex(totalXP);
  const ranks = T[lang].ranks;
  const isFinished = allMissions.every(m => completed[m.id]);
  const showParent = parseInt(profile.age) < 16;

  const addToast = useCallback((msg, type) => {
    const id = ++toastId.current;
    setToasts(ts => [...ts.slice(-1), {id, msg, type}]);
    setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 2200);
  }, []);

  // Save to storage whenever completed/XP changes
  useEffect(() => {
    const save = async () => {
      try {
        const key = storageKey(profile.name);
        await window.storage.set(key, JSON.stringify({
          profile, course, lang,
          completed, totalXP,
          savedAt: Date.now(),
        }));
        setShowSaved(true);
        setTimeout(() => setShowSaved(false), 2000);
      } catch {}
    };
    if (Object.keys(completed).length > 0) save();
  }, [completed, totalXP]);

  const getMissionStatus = (mission) => {
    if (completed[mission.id]) return "done";
    const idx = allMissions.findIndex(m => m.id === mission.id);
    if (idx === 0) return "available";
    const prev = allMissions[idx - 1];
    return prev && completed[prev.id] ? "available" : "locked";
  };

  const handleComplete = useCallback((id, xp, card_id) => {
    if (completed[id]) return;
    const missionName = allMissions.find(m => m.id === id)?.name || "";
    setCompleted(c => ({ ...c, [id]: { xp, card_id, name: missionName, ts: Date.now() } }));
    setTotalXP(x => {
      const newXP = x + xp;
      addToast(`+${xp} XP`, "xp");
      const newRank = getRankIndex(newXP);
      if (newRank > prevRankRef.current) {
        prevRankRef.current = newRank;
        setTimeout(() => addToast(`${T[lang].rank_up} ${ranks[newRank]}`, "rank"), 600);
      }
      if (card_id) setTimeout(() => addToast(T[lang].card_unlocked, "card"), 1200);
      return newXP;
    });
  }, [completed, allMissions, lang, ranks, addToast]);

  const xpToNext = rankIdx < XP_THRESHOLDS.length - 1 ? XP_THRESHOLDS[rankIdx + 1] - totalXP : 0;
  const progress = totalPossibleXP > 0 ? Math.min((totalXP / totalPossibleXP) * 100, 100) : 0;

  if (isFinished && tab === "course") {
    return (
      <>
        <ToastDisplay toasts={toasts} />
        {showSaved && <div className="save-badge">{t.saved_badge}</div>}
        <FinalScreen profile={profile} totalXP={totalXP} unlockedCardIds={unlockedCardIds} lang={lang} t={t} onRestart={onRestart} />
      </>
    );
  }

  const tabs = [
    {key:"course", label: t.tab_course},
    ...(showParent ? [{key:"parent", label: t.tab_parent}] : []),
    {key:"cards", label: t.tab_cards},
  ];

  return (
    <div className="content">
      <ToastDisplay toasts={toasts} />
      {showSaved && <div className="save-badge">{t.saved_badge}</div>}

      <h1 style={{fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:"clamp(20px,5vw,28px)", fontWeight:800, lineHeight:1.15, marginBottom:6}}>{course.title}</h1>
      <p style={{color: C.textMuted, fontSize:13, marginBottom:22}}>{course.subtitle}</p>

      <div className="player-card">
        <div className="avatar">{profile.name[0]?.toUpperCase()}</div>
        <div className="player-info">
          <div className="player-name">{profile.name}</div>
          <div className="player-meta">{Object.keys(completed).length} {t.missions_done} {allMissions.length} {t.missions_label}</div>
        </div>
        <div className="xp-block">
          <div className="xp-val">{totalXP}</div>
          <div className="xp-lbl">{t.xp_earned}</div>
        </div>
      </div>

      <div className="rank-row">
        <div className="rank-badge"><span className="rank-icon">◈</span>{ranks[rankIdx]}</div>
        {xpToNext > 0 && <span className="xp-to-next">{xpToNext} XP →</span>}
      </div>

      <div className="pbar-wrap">
        <div className="pbar-fill" style={{width:`${progress}%`}} />
      </div>

      <div className="tabs">
        {tabs.map(tb => (
          <button key={tb.key} className={`tab-btn ${tab === tb.key ? "active" : ""}`} onClick={() => setTab(tb.key)}>
            {tb.label}
          </button>
        ))}
      </div>

      {tab === "course" && course.levels.map((level) => (
        <div key={level.id}>
          <div className="lvl-head">
            <span className="lvl-lbl">{t.level_label} {level.id}</span>
            <span className="lvl-name">{level.name}</span>
          </div>
          <div className="lvl-tag">{level.tagline}</div>
          <div className="mission-list">
            {level.missions.map((m, mi) => (
              <MissionCard key={m.id} mission={m} index={mi} status={getMissionStatus(m)}
                profile={profile} lang={lang} t={t} powerCards={powerCards}
                onComplete={handleComplete} />
            ))}
          </div>
        </div>
      ))}

      {tab === "parent" && showParent && (
        <ParentPanel profile={profile} course={course} completed={completed}
          totalXP={totalXP} t={t} lang={lang} />
      )}

      {tab === "cards" && (
        <CardsPanel unlockedCardIds={unlockedCardIds} t={t} lang={lang} />
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState("ru");
  const [screen, setScreen] = useState("intro");
  const [profile, setProfile] = useState(null);
  const [course, setCourse] = useState(null);
  const [error, setError] = useState(null);
  const [savedData, setSavedData] = useState(null);
  const [resumeData, setResumeData] = useState(null);
  const t = T[lang];

  // Check for saved progress on mount
  useEffect(() => {
    const checkSaved = async () => {
      try {
        const keys = await window.storage.list("aiq-");
        if (keys?.keys?.length > 0) {
          const latest = await window.storage.get(keys.keys[keys.keys.length - 1]);
          if (latest?.value) {
            const parsed = JSON.parse(latest.value);
            setSavedData(parsed);
          }
        }
      } catch {}
    };
    checkSaved();
  }, []);

  const handleStart = async (formData, isResume, resumeSaved) => {
    if (!formData) { setSavedData(null); return; }
    if (isResume && resumeSaved) {
      setProfile(resumeSaved.profile);
      setCourse(resumeSaved.course);
      setResumeData(resumeSaved);
      setScreen("course");
      return;
    }
    setProfile(formData);
    setScreen("loading");
    setError(null);
    try {
      const generated = await generateCourse(formData, lang);
      setCourse(generated);
      setResumeData(null);
      setScreen("course");
    } catch (e) {
      setError(t.error);
      setScreen("intro");
    }
  };

  const handleRestart = async () => {
    if (profile) {
      try { await window.storage.delete(storageKey(profile.name)); } catch {}
    }
    setProfile(null); setCourse(null); setResumeData(null);
    setSavedData(null); setScreen("intro");
  };

  return (
    <>
      <style>{STYLES}</style>
      <div className="app">
        <div className="bg-mesh">
          <div className="mesh-blob mb1" /><div className="mesh-blob mb2" /><div className="mesh-blob mb3" />
        </div>

        <div className="lang-toggle">
          <button className={`lang-btn ${lang === "ru" ? "active" : ""}`} onClick={() => setLang("ru")}>RU</button>
          <button className={`lang-btn ${lang === "en" ? "active" : ""}`} onClick={() => setLang("en")}>EN</button>
        </div>

        {error && (
          <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:`rgba(240,96,96,.12)`,border:`1px solid rgba(240,96,96,.4)`,color:"#fca5a5",padding:"9px 18px",borderRadius:10,fontSize:13,zIndex:200}}>
            {error}
          </div>
        )}

        {screen === "intro" && (
          <IntroScreen lang={lang} t={t} onStart={handleStart} savedData={savedData} />
        )}
        {screen === "loading" && <LoadingScreen profile={profile} t={t} />}
        {screen === "course" && course && (
          <CourseScreen
            profile={profile} course={course} lang={lang} t={t}
            initialCompleted={resumeData?.completed || {}}
            initialXP={resumeData?.totalXP || 0}
            onRestart={handleRestart}
          />
        )}
      </div>
    </>
  );
}


// Storage polyfill for standalone HTML
if (!window.storage) {
  const _store = {};
  window.storage = {
    get: async (key) => {
      const val = localStorage.getItem('aiq_' + key);
      if (!val) throw new Error('Key not found');
      return { key, value: val };
    },
    set: async (key, value) => {
      localStorage.setItem('aiq_' + key, typeof value === 'string' ? value : JSON.stringify(value));
      return { key, value };
    },
    delete: async (key) => {
      localStorage.removeItem('aiq_' + key);
      return { key, deleted: true };
    },
    list: async (prefix = '') => {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('aiq_' + prefix)) keys.push(k.replace('aiq_', ''));
      }
      return { keys };
    }
  };
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));


  // Hide loading fallback once app mounts
  document.getElementById('loading-fallback').style.display = 'none';
  </script>
</body>
</html>
